<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Акордеон</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Акордеон</h1>

      <div class="accordion">
        <h3>
          <button id="btn-1" aria-expanded="false" aria-controls="panel-1">
            Перший пункт
          </button>
        </h3>
        <div id="panel-1" role="region" aria-labelledby="btn-1" hidden>
          <p>Вміст першого розділу.</p>
        </div>

        <h3>
          <button id="btn-2" aria-expanded="false" aria-controls="panel-2">
            Другий пункт
          </button>
        </h3>
        <div id="panel-2" role="region" aria-labelledby="btn-2" hidden>
          <p>Вміст другого розділу.</p>
        </div>

        <h3>
          <button id="btn-3" aria-expanded="false" aria-controls="panel-3">
            Третій пункт
          </button>
        </h3>
        <div id="panel-3" role="region" aria-labelledby="btn-3" hidden>
          <p>Вміст третього розділу.</p>
        </div>

        <h3>
          <button id="btn-4" aria-expanded="false" aria-controls="panel-4">
            Четвертий пункт
          </button>
        </h3>
        <div id="panel-4" role="region" aria-labelledby="btn-4" hidden>
          <p>Вміст четвертого розділу.</p>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
