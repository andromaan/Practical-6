<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accordion</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Accordion</h1>

      <div class="accordion">
        <h3>
          <button id="btn-1" aria-expanded="false" aria-controls="panel-1">
            First Item
          </button>
        </h3>
        <div id="panel-1" role="region" aria-labelledby="btn-1" hidden>
          <p>Content of the first section.</p>
        </div>

        <h3>
          <button id="btn-2" aria-expanded="false" aria-controls="panel-2">
            Second Item
          </button>
        </h3>
        <div id="panel-2" role="region" aria-labelledby="btn-2" hidden>
          <p>Content of the second section.</p>
        </div>

        <h3>
          <button id="btn-3" aria-expanded="false" aria-controls="panel-3">
            Third Item
          </button>
        </h3>
        <div id="panel-3" role="region" aria-labelledby="btn-3" hidden>
          <p>Content of the third section.</p>
        </div>

        <h3>
          <button id="btn-4" aria-expanded="false" aria-controls="panel-4">
            Fourth Item
          </button>
        </h3>
        <div id="panel-4" role="region" aria-labelledby="btn-4" hidden>
          <p>Content of the fourth section.</p>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
